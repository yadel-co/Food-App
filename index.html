<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodDash — Git Workshop App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- The phone frame is just for looks. All your tasks are INSIDE .screen -->
  <div class="phone">
    <div class="screen">

      <!-- ===== Header: avatar + location ===== -->
      <header class="top-bar">
        <div class="profile">
          <div class="avatar">🧑‍💻</div>
          <!-- TASK 1: change the name below to YOUR name -->
          <span class="greeting">Hi, Student!</span>
        </div>
        <div class="location">
          <span class="pin">📍</span>
          <!-- TASK 2: change the city to YOUR city -->
          <span>Cairo</span>
        </div>
      </header>

      <!-- ===== Discount banner ===== -->
      <!-- TASK 3: delete this whole <section> to remove the banner -->
      <section class="banner">
        <h1>Flat 50 % Off<br />On First Order!</h1>
      </section>

      <!-- ===== Search ===== -->
      <section class="search-row">
        <label class="search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search" />
        </label>
        <button class="filter-btn" aria-label="Filters">
          <svg viewBox="0 0 24 24"><path d="M4 7h10M18 7h2M4 17h2M10 17h10M14 4v6M6 14v6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>
        </button>
      </section>

      <!-- ===== Category chips ===== -->
      <nav class="chips">
        <button class="chip chip--active">All</button>
        <button class="chip">Pizza</button>
        <button class="chip">Biryani</button>
        <!-- TASK 4: add one more chip here, e.g. "Drinks" -->
        <button class="chip">Desserts</button>
      </nav>

      <!-- ===== Food cards ===== -->
      <main class="grid">

        <article class="card">
          <button class="heart" aria-label="Add to favourites">♥</button>
          <div class="food">🍔</div>
          <h2>Mega Melt Burger</h2>
          <p class="meta"><span class="tag">Burger ★★★★</span></p>
          <!-- TASK 5: change this price -->
          <p class="price">Rs.250 <button class="add" aria-label="Add to cart">+</button></p>
        </article>

        <article class="card">
          <button class="heart" aria-label="Add to favourites">♥</button>
          <div class="food">🍕</div>
          <h2>Margherita Pizza</h2>
          <p class="meta"><span class="tag">Pizza ★★★★</span></p>
          <p class="price">Rs.350 <button class="add" aria-label="Add to cart">+</button></p>
        </article>

        <article class="card">
          <button class="heart" aria-label="Add to favourites">♥</button>
          <div class="food">🥤</div>
          <h2>Creamy Coffee Blast</h2>
          <p class="meta"><span class="tag">Coffee ★★★★</span></p>
          <p class="price">Rs.180 <button class="add" aria-label="Add to cart">+</button></p>
        </article>

        <article class="card">
          <button class="heart" aria-label="Add to favourites">♥</button>
          <div class="food">🍛</div>
          <h2>Veg – Biryani</h2>
          <p class="meta"><span class="tag">Biryani ★★★★</span></p>
          <p class="price">Rs.220 <button class="add" aria-label="Add to cart">+</button></p>
        </article>

        <!-- TASK 6: add a NEW card here (copy one above and change the emoji, name and price) -->

      </main>

      <!-- ===== Bottom navigation ===== -->
      <!-- TASK 7: delete this whole <nav> to remove the bottom bar -->
      <!-- CONFLICT EXERCISE: two students edit the SAME heart button below on two branches -->
      <nav class="bottom-nav">
        <button aria-label="Home" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M4 11 12 4l8 7v8a1 1 0 0 1-1 1h-4v-5h-6v5H5a1 1 0 0 1-1-1v-8Z" fill="currentColor"/></svg>
        </button>
        <button aria-label="Favourites" class="nav-btn" id="favorites-button">
          <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-9.2-8.8C1.2 8 3 5 6.2 5c2 0 3.3 1 4 2.2h1.6C12.5 6 13.8 5 15.8 5 19 5 20.8 8 21.2 11.2 19 15.4 12 20 12 20Z" fill="currentColor"/></svg>
        </button>
        <button aria-label="Notifications" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0-6 6v4l-1.5 3h15L18 13V9a6 6 0 0 0-6-6Zm-2 15a2 2 0 0 0 4 0" fill="currentColor"/></svg>
        </button>
        <button aria-label="Cart" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M4 5h2l2.4 9.6a1.5 1.5 0 0 0 1.5 1.1h7.4a1.5 1.5 0 0 0 1.4-1L21 8H7M10 20a1.3 1.3 0 1 0 0-.01M17 20a1.3 1.3 0 1 0 0-.01" stroke="currentColor" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button aria-label="Profile" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M12 11a3.4 3.4 0 1 0 0-6.8A3.4 3.4 0 0 0 12 11Zm-7 9c.6-3.8 3.4-6 7-6s6.4 2.2 7 6H5Z" fill="currentColor"/></svg>
        </button>
      </nav>

    </div>
  </div>

</body>
</html>
